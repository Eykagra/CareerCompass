services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: career-compass:latest
    container_name: career-compass
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/backend/data
    volumes:
      - careercompass-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  careercompass-data:
